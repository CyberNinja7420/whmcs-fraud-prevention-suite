stages:
  - validate
  - security

# PHP syntax lint on all files
php-lint:
  stage: validate
  image: php:8.2-cli
  script:
    - echo "Checking PHP syntax on all files..."
    - find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \; 2>&1 | tee lint-results.txt
    - "! grep -q 'Parse error' lint-results.txt"
    - echo "All PHP files pass syntax check"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# hooks.php structure audit
hooks-audit:
  stage: validate
  image: php:8.2-cli
  script:
    - echo "Auditing hooks.php structure..."
    # Must not contain standalone function definitions (only add_hook closures)
    - |
      if grep -n "^function " hooks.php 2>/dev/null; then
        echo "ERROR: hooks.php contains standalone function definitions!"
        echo "Only add_hook() closures are allowed in hooks.php"
        exit 1
      fi
    - echo "hooks.php structure OK"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# Function name conflict detection
conflict-check:
  stage: validate
  image: php:8.2-cli
  script:
    - echo "Checking for WHMCS core function name conflicts..."
    - |
      CONFLICTS=$(grep -rn "^function logTransaction\|^function logActivity\|^function sendMessage\|^function addTransaction\|^function updateInvoiceTotal\|^function getClientsDetails\|^function localAPI\|^function encrypt\b\|^function decrypt\b" *.php lib/**/*.php 2>/dev/null || true)
      if [ -n "$CONFLICTS" ]; then
        echo "ERROR: Function name conflicts with WHMCS core detected!"
        echo "$CONFLICTS"
        exit 1
      fi
    - echo "No function name conflicts"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# Security: check for hardcoded credentials
secret-scan:
  stage: security
  image: php:8.2-cli
  script:
    - echo "Scanning for hardcoded secrets..."
    - |
      SECRETS=$(grep -rn "password\s*=\s*['\"][^'\"]\{8,\}" *.php lib/**/*.php templates/**/*.tpl 2>/dev/null | grep -v "placeholder\|example\|YOUR_\|_hash\|Description\|FriendlyName" || true)
      if [ -n "$SECRETS" ]; then
        echo "WARNING: Possible hardcoded secrets detected!"
        echo "$SECRETS"
        exit 1
      fi
    - echo "No hardcoded secrets found"
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

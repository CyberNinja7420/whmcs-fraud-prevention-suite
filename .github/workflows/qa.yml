name: QA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  php-lint:
    runs-on: ubuntu-latest
    name: PHP syntax lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: none
      - name: Lint every PHP file
        run: |
          set -e
          fail=0
          while IFS= read -r -d '' f; do
            if ! php -l "$f" >/dev/null 2>&1; then
              echo "::error file=$f::PHP lint failure"
              php -l "$f"
              fail=1
            fi
          done < <(find . -name '*.php' \
                     -not -path './vendor/*' \
                     -not -path './phpstan-stubs/*' \
                     -not -path './docs/*' \
                     -print0)
          exit "$fail"

  phpstan:
    runs-on: ubuntu-latest
    name: PHPStan static analysis
    needs: php-lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.json') }}
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --configuration=phpstan.neon.dist --no-progress --memory-limit=512M

  psalm:
    runs-on: ubuntu-latest
    name: Psalm static analysis
    needs: php-lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.json') }}
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Run Psalm
        run: vendor/bin/psalm --no-cache --no-progress --show-info=false
